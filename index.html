<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Endpoints Phonebox</title>
    <script src="https://sdk.twilio.com/js/voice/releases/1.25.0/twilio.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="title-wrap">
          <h1>Virtual Endpoints Phonebox</h1>
          <p class="subtitle">Bionic Studio-inspired virtual endpoints console</p>
        </div>
        <div class="topbar-controls">
          <button id="muteToggle" class="control-btn" aria-pressed="false">Ring Sound: On</button>
        </div>
      </header>

      <main>
        <section>
          <div id="endpointGrid" class="endpoint-grid" aria-live="polite"></div>
        </section>

        <aside class="event-panel">
          <div class="event-panel-header">
            <h2>Event Log</h2>
            <span>Last 20</span>
          </div>
          <ul id="eventLog" class="event-log"></ul>
        </aside>
      </main>

      <div class="footer-actions">
        <button id="resetBtn" class="reset-btn">Reset</button>
      </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <audio id="ringAudio" preload="auto" loop>
      <source src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg" type="audio/ogg" />
    </audio>

    <script src="app.js"></script>
  </body>
</html>
